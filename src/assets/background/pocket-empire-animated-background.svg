<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Burgundy and teal game background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a141d"/>
      <stop offset="0.35" stop-color="#28090f"/>
      <stop offset="0.62" stop-color="#07181e"/>
      <stop offset="1" stop-color="#022b35"/>
    </linearGradient>

    <radialGradient id="warmGlow" cx="0.22" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#d97081" stop-opacity="0.72"/>
      <stop offset="0.25" stop-color="#8b2637" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2a0710" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coolGlow" cx="0.84" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#35c3d0" stop-opacity="0.35"/>
      <stop offset="0.35" stop-color="#0f7f8f" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00151c" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ribbonMain" x1="0" y1="0" x2="1" y2="0.85">
      <stop offset="0" stop-color="#ffd9df" stop-opacity="0.58"/>
      <stop offset="0.16" stop-color="#f8a5b7" stop-opacity="0.62"/>
      <stop offset="0.48" stop-color="#76cddd" stop-opacity="0.50"/>
      <stop offset="0.72" stop-color="#148090" stop-opacity="0.43"/>
      <stop offset="1" stop-color="#032f3a" stop-opacity="0.14"/>
    </linearGradient>

    <linearGradient id="ribbonEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="0.2" stop-color="#ffd4dc" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#77e5ec" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0a6674" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="darkRibbon" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0" stop-color="#050203"/>
      <stop offset="0.45" stop-color="#08090c"/>
      <stop offset="1" stop-color="#03181e"/>
    </linearGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd8df" stop-opacity="0.05"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.58"/>
      <stop offset="0.62" stop-color="#9df3ff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7edee8" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <filter id="microGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="8" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="soft-light"/>
    </filter>

    <clipPath id="canvasClip">
      <rect width="1600" height="1000"/>
    </clipPath>
  </defs>

  <g clip-path="url(#canvasClip)" filter="url(#noise)">
    <rect width="1600" height="1000" fill="url(#base)"/>
    <ellipse cx="290" cy="40" rx="680" ry="520" fill="url(#warmGlow)" filter="url(#softBlur)"/>
    <ellipse cx="1360" cy="510" rx="640" ry="580" fill="url(#coolGlow)" filter="url(#softBlur)" opacity=".81"/>

    <g>
      <path d="M-110 1040C320 735 438 410 630 213C832 6 1127-48 1710 40L1710 1080L-110 1080Z" fill="url(#darkRibbon)" opacity=".98"/>
      <path d="M-140 1040C250 814 392 505 565 314C733 129 942 17 1250-7" fill="none" stroke="#000" stroke-opacity=".48" stroke-width="88" stroke-linecap="round"/>
    </g>

    <g>
      <path d="M620 1090C920 809 826 526 1028 286C1188 96 1405 29 1728 7L1728 1080L620 1090Z" fill="url(#ribbonMain)" opacity=".98"/>
      <path d="M646 1080C942 797 846 528 1042 300C1206 110 1417 47 1710 24" fill="none" stroke="url(#ribbonEdge)" stroke-width="13" stroke-linecap="round" opacity=".78" filter="url(#microGlow)"/>
      <path d="M706 1010C958 753 900 539 1083 338C1240 166 1414 101 1660 72" fill="none" stroke="#d8fbff" stroke-opacity=".12" stroke-width="2.2"/>
      <path d="M775 976C1000 741 949 548 1118 369C1254 225 1426 155 1620 128" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="1.4"/>
    </g>

    <path d="M-110 767C237 560 456 290 698 164C858 81 1028 39 1221 28" fill="none" stroke="url(#lineGlow)" stroke-width="2.5" stroke-linecap="round" filter="url(#microGlow)" opacity=".57"/>
    <path d="M-50 839C329 625 523 405 760 254C986 110 1199 67 1468 61" fill="none" stroke="#ffd7df" stroke-opacity=".21" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M122 953C493 731 698 527 908 390C1143 236 1364 178 1620 173" fill="none" stroke="#92edf5" stroke-opacity=".16" stroke-width="1.8" stroke-linecap="round"/>

    <ellipse cx="1115" cy="264" rx="190" ry="44" fill="#fff" opacity=".035" transform="rotate(-24 1115 264)" filter="url(#softBlur)"/>
    <ellipse cx="540" cy="170" rx="160" ry="36" fill="#fff" opacity=".025" transform="rotate(-18 540 170)" filter="url(#softBlur)"/>

    <rect x="0" y="0" width="1600" height="1000" fill="url(#warmGlow)" opacity=".14"/>
  </g>
</svg>
